name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  ping-api:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Fetch About API
        run: curl -s https://api-azuvicenna-portfolio.up.railway.app/api/v1/about > /dev/null

      - name: Keep GitHub Actions Alive
        uses: gautamkrishnar/keepalive-workflow@v2